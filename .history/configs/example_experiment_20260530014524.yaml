name: baseline_comparison
dataset:
  # Use a registered dataset name from datasets/registry
  registered_name: iris
  test_size: 0.3
  preprocessing:
    scaling: standard
    encoding: onehot
models:
  - name: RandomForest
    type: RandomForest
    params:
      n_estimators: 100
      random_state: 42

  - name: LogisticRegression
    type: LogisticRegression
    params:
      max_iter: 1000
      random_state: 42

random_state: 42
out_dir: results
seed: 42